url: https://um-kevinhe.github.io/SurvBregDiv/
template:
  bootstrap: 5
  bslib:
    base_font: {google: "Roboto"}
    heading_font: {google: "Roboto Slab"}
    code_font: {google: "JetBrains Mono"}
  params:
    bootswatch: lumen
    ganalytics: UA-54921687-5
    mathjax: true
  in_header:
    - pkgdown/extra.css
toc:
  depth: 6
navbar:
  type: inverse
  left:
    - text: "Home"
      href: index.html
    - text: "Get started"
      href: articles/SurvBregDiv.html
    - text: "Appendix"
      menu:
        - text: "CV Criteria"
          href: articles/CV_Criteria.html
        - text: "Cox KL Divergence"
          href: articles/coxkl.html
        - text: "Cox KL: Tied Event Times"
          href: articles/coxkl_ties.html
        - text: "NCC KL Divergence"
          href: articles/ncc.html
    - text: "Reference"
      href: reference/index.html
  right:
    - icon: fa-github fa-lg
      href: https://github.com/UM-KevinHe/SurvBregDiv
      aria-label: "GitHub repository"
articles:
  - title: "Get started"
    contents:
      - SurvBregDiv
  - title: "Appendix"
    contents:
      - CV_Criteria
      - coxkl
      - coxkl_ties
      - ncc
reference:
  - title: "Low-Dimensional Individual-Level Internal–External Integration"
    desc: >
      Models that integrate individual-level external data via composite likelihood
      weighting, for both full-cohort Cox and nested case-control (NCC) designs.
    contents:
      - cox_indi
      - cv.cox_indi
      - ncc_indi
      - cv.ncc_indi
  - title: "Low-Dimensional KL Divergence-Based Integration"
    desc: >
      Models that integrate external coefficient summaries via Kullback–Leibler
      divergence penalization, for both full-cohort Cox and nested case-control (NCC) designs.
    contents:
      - coxkl
      - cv.coxkl
      - bopt.coxkl
      - coxkl_ties
      - cv.coxkl_ties
      - ncckl
      - cv.ncckl
  - title: "Low-Dimensional Mahalanobis Distance-Based Integration"
    desc: >
      Models that integrate external coefficient and curvature summaries via
      Mahalanobis distance penalization, for both full-cohort Cox and matched
      case-control (NCC) designs.
    contents:
      - cox_MDTL
      - cv.cox_MDTL
      - ncc_MDTL
      - cv.ncc_MDTL
  - title: "High-Dimensional Individual-Level Internal–External Integration"
    desc: >
      Penalized models with Elastic Net regularization that integrate individual-level
      external data, for both full-cohort Cox and nested case-control (NCC) designs.
    contents:
      - cox_indi_enet
      - cv.cox_indi_enet
      - ncc_indi_enet
      - cv.ncc_indi_enet
  - title: "High-Dimensional KL Divergence-Based Integration"
    desc: >
      Penalized models with Ridge, Lasso, or Elastic Net regularization that integrate
      external coefficient summaries via KL divergence, for both full-cohort Cox and
      nested case-control (NCC) designs.
    contents:
      - coxkl_ridge
      - coxkl_enet
      - cv.coxkl_ridge
      - cv.coxkl_enet
      - ncckl_enet
      - cv.ncckl_enet
  - title: "High-Dimensional Mahalanobis Distance-Based Integration"
    desc: >
      Penalized models with Ridge, Lasso, or Elastic Net regularization that integrate
      external coefficient and curvature summaries via Mahalanobis distance, for both
      full-cohort Cox and nested case-control (NCC) designs.
    contents:
      - cox_MDTL_ridge
      - cox_MDTL_enet
      - cv.cox_MDTL_ridge
      - cv.cox_MDTL_enet
      - ncc_MDTL_enet
      - cv.ncc_MDTL_enet
  - title: "Variable Selection and Stability for High-Dimensional Models"
    contents:
      - variable_importance
      - coxkl_enet.StabSelect
      - cox_MDTL_enet.StabSelect
  - title: "Bagging for High-Dimensional Models"
    contents:
      - coxkl_enet_bagging
      - cox_MDTL_enet_bagging
  - title: "Multi-Source Integration"
    contents:
      - coxkl_enet.multi
  - title: "Plotting Functions"
    contents:
      - cv.plot
      - plot.coxkl
      - plot.coxkl_ridge
      - plot.coxkl_enet
      - plot.cox_MDTL
      - plot.cox_MDTL_enet
      - plot.cox_MDTL_ridge
      - plot.StabSelect
      - plot.variable_importance
      - plot.coxkl_enet.multi
  - title: "Utilities"
    contents:
      - generate_eta
  - title: "Datasets"
    contents:
      - ExampleData_lowdim
      - ExampleData_highdim
      - ExampleData_cc
      - ExampleData_cc_highdim
      - ExampleData_indi
